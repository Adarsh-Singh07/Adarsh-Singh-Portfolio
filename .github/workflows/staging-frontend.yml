name: Verify & Deploy Staging Frontend to Firebase

on:
  push:
    branches: [ feature/admin-crud-panel ]
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.github/workflows/staging-frontend.yml'

permissions:
  id-token: write
  contents: read

jobs:
  validate-and-deploy:
    name: Verify and Deploy Staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Verify Frontend Code (Lint & Build)
        run: |
          cd frontend
          npm run lint
          npm run build

      - name: Deploy Frontend to Firebase Hosting (Staging Site)
        run: |
          npx firebase-tools deploy --only hosting:portfolio-staging --token "${{ secrets.FIREBASE_TOKEN }}" --project portfolio2049
