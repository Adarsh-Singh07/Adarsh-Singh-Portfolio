name: Verify & Deploy Frontend to Firebase

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

permissions:
  id-token: write
  contents: read

jobs:
  validate-and-deploy:
    name: Verify and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Verify Frontend Code (Lint & Build)
        run: |
          cd frontend
          npm run lint
          npm run build

      - name: Deploy Frontend to Firebase Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project portfolio2049
