name: Secure Portfolio CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write # Required for requesting the OIDC JWT from GitHub
  contents: read  # Required for checkout

jobs:
  # 1. Validation & Test Job (Continuous Integration)
  validate:
    name: Code Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Verify Frontend Code (Lint & Build)
        run: |
          cd frontend
          npm run lint
          npm run build

  # 2. Deploy Job (Continuous Delivery)
  deploy:
    name: Cloud Deploy
    needs: validate
    runs-on: ubuntu-latest
    # Only run deploy on merges/pushes directly to main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # OIDC Passwordless Login to Google Cloud
      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Authenticate Docker to GCP Artifact Registry
      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      # Build and Push Backend Container to Artifact Registry
      - name: Build & Push Backend Container
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/portfolio/backend:latest ./backend
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/portfolio/backend:latest

      # Deploy Backend to Cloud Run (With GCS FUSE DB Mount)
      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy portfolio-backend \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/portfolio/backend:latest \
            --region us-central1 \
            --add-volume=name=db-volume,type=cloud-storage,bucket=${{ secrets.GCS_BUCKET_NAME }} \
            --add-volume-mount=volume=db-volume,mount-path=/app/data \
            --update-env-vars "^#^ALLOWED_ORIGINS=https://${{ secrets.GCP_PROJECT_ID }}.web.app,https://${{ secrets.GCP_PROJECT_ID }}.firebaseapp.com" \
            --allow-unauthenticated

      # Set up Node.js & Compile Frontend build for deployment
      - name: Set up Node.js for Frontend Build
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend static assets
        run: |
          cd frontend
          npm ci
          npm run build

      # Deploy Frontend to Firebase Hosting (Production Channel)
      - name: Deploy Frontend to Firebase Hosting
        run: |
          npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project portfolio2049

